<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TiFboxes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    background: #1a1a2e;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(30,60,90,0.3) 0%, transparent 50%),
      radial-gradient(circle at 80% 50%, rgba(90,30,60,0.2) 0%, transparent 50%),
      linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  #ground {
    position: absolute;
    bottom: 0;
    left: -200px;
    right: -200px;
    height: 6px;
    background: linear-gradient(180deg, rgba(100,200,255,0.6), rgba(100,200,255,0.1));
    box-shadow: 0 -2px 20px rgba(100,200,255,0.2);
    pointer-events: none;
    z-index: 1;
  }

  #ground-surface {
    position: absolute;
    bottom: 0;
    left: -200px;
    right: -200px;
    height: 60px;
    background: linear-gradient(180deg, rgba(100,200,255,0.05), transparent);
    pointer-events: none;
    z-index: 0;
  }

  .box-wrapper {
    position: absolute;
    cursor: grab;
    will-change: transform;
  }

  .box-wrapper.dragging {
    cursor: grabbing;
    z-index: 1000 !important;
  }

  .box-wrapper.dragging .box-3d {
    filter: drop-shadow(0 20px 30px rgba(0,0,0,0.6));
  }

  .box-3d {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    transition: filter 0.2s;
  }

  .box-face {
    position: absolute;
    border: 1px solid rgba(0,0,0,0.15);
  }

  /* Cardboard texture via CSS */
  .box-face::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.03) 3px,
        rgba(0,0,0,0.03) 4px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 5px,
        rgba(0,0,0,0.02) 5px,
        rgba(0,0,0,0.02) 6px
      );
    pointer-events: none;
  }

  /* Tape strip */
  .box-face.front::after {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 30%;
    height: 100%;
    background: rgba(200,180,140,0.25);
    border-left: 1px solid rgba(0,0,0,0.05);
    border-right: 1px solid rgba(0,0,0,0.05);
    pointer-events: none;
  }

  .hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    pointer-events: none;
    transition: opacity 2s;
    text-align: center;
  }
  .hint.fade { opacity: 0; }

  #toolbar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 9000;
  }

  #toolbar button {
    padding: 10px 18px;
    border-radius: 25px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: white;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    transition: background 0.2s, transform 0.1s;
  }

  #toolbar button:active {
    background: rgba(255,255,255,0.25);
    transform: scale(0.95);
  }

  #toolbar button.active {
    background: rgba(100,200,255,0.3);
    border-color: rgba(100,200,255,0.5);
  }

  #stats {
    position: fixed;
    top: 75px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    z-index: 9000;
    pointer-events: none;
  }

  #trash-zone {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(255,60,60,0.15);
    border: 2px dashed rgba(255,60,60,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    z-index: 9000;
    transition: background 0.2s, transform 0.2s;
    pointer-events: none;
  }

  #trash-zone.active {
    background: rgba(255,60,60,0.4);
    border-color: rgba(255,60,60,0.8);
    transform: scale(1.2);
  }
</style>
</head>
<body>

<div id="canvas">
  <div id="ground-surface"></div>
  <div id="ground"></div>
</div>

<div id="toolbar">
  <button id="add-box" title="Add Box">📦 Add Box</button>
  <button id="toggle-gravity" title="Toggle Gravity">⬇️ Gravity</button>
  <button id="clear-all" title="Clear All">🗑️ Clear</button>
</div>

<div id="stats"></div>
<div id="trash-zone">🗑️</div>
<div class="hint" id="hint">Drag boxes to stack · Pinch to scale · Two fingers to rotate · Drag to 🗑️ to remove</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('canvas');

  // Cardboard color palette
  const COLORS = [
    { base: '#C4A56E', dark: '#9E7E4A', light: '#D9BD88' },  // classic cardboard
    { base: '#B8956A', dark: '#8E6D42', light: '#D4B48E' },  // kraft brown
    { base: '#C9A87C', dark: '#A07D4F', light: '#E0C9A6' },  // light tan
    { base: '#A68B5B', dark: '#7E6538', light: '#C4AA7E' },  // dark kraft
    { base: '#BFA27A', dark: '#967A50', light: '#D6BE9A' },  // warm brown
    { base: '#D1B78E', dark: '#A8906A', light: '#E5D0AB' },  // pale cardboard
    { base: '#B09060', dark: '#886A3C', light: '#CDB08A' },  // corrugated
    { base: '#C0A070', dark: '#987A48', light: '#DABE96' },  // recycled brown
  ];

  const BOX_SIZES = [
    { w: 60, h: 50, d: 40 },
    { w: 80, h: 55, d: 50 },
    { w: 70, h: 65, d: 45 },
    { w: 90, h: 60, d: 55 },
    { w: 55, h: 75, d: 40 },
    { w: 100, h: 55, d: 60 },
    { w: 75, h: 70, d: 50 },
    { w: 110, h: 65, d: 55 },
  ];

  let boxes = [];
  let boxIdCounter = 0;
  let zCounter = 1;
  let gravityOn = true;
  let animFrame = null;

  const GRAVITY = 0.5;
  const FRICTION = 0.8;
  const BOUNCINESS = 0.2;
  const DAMPING = 0.98;

  function getGroundY() {
    return window.innerHeight - 6;
  }

  function createBox3D(w, h, d, color) {
    const wrapper = document.createElement('div');
    wrapper.className = 'box-wrapper';
    wrapper.style.width = w + 'px';
    wrapper.style.height = h + 'px';
    wrapper.style.marginLeft = (-w / 2) + 'px';
    wrapper.style.marginTop = (-h / 2) + 'px';

    const box3d = document.createElement('div');
    box3d.className = 'box-3d';

    // Perspective depth for 3D look
    const topSkew = d * 0.4;

    // Front face
    const front = document.createElement('div');
    front.className = 'box-face front';
    front.style.cssText = `
      width: ${w}px; height: ${h}px;
      background: linear-gradient(180deg, ${color.light} 0%, ${color.base} 30%, ${color.dark} 100%);
      position: absolute; bottom: 0; left: 0;
    `;

    // Top face (parallelogram)
    const top = document.createElement('div');
    top.className = 'box-face top';
    top.style.cssText = `
      width: ${w}px; height: ${topSkew}px;
      background: linear-gradient(180deg, ${color.light}, ${color.base});
      position: absolute; bottom: ${h}px; left: 0;
      transform-origin: bottom left;
      transform: skewX(-40deg);
    `;

    // Right face (parallelogram)
    const right = document.createElement('div');
    right.className = 'box-face right';
    right.style.cssText = `
      width: ${topSkew}px; height: ${h}px;
      background: linear-gradient(270deg, ${color.dark}, ${adjustBrightness(color.dark, -20)});
      position: absolute; bottom: 0; left: ${w}px;
      transform-origin: bottom left;
      transform: skewY(-50deg);
    `;

    // Flap lines on top (cardboard flaps)
    const flapLine = document.createElement('div');
    flapLine.style.cssText = `
      position: absolute; bottom: ${h - 1}px; left: 10%;
      width: 80%; height: 1px;
      background: rgba(0,0,0,0.15);
      pointer-events: none;
    `;

    // Center seam on front
    const seam = document.createElement('div');
    seam.style.cssText = `
      position: absolute; bottom: 0; left: 50%;
      width: 1px; height: ${h}px;
      background: rgba(0,0,0,0.08);
      pointer-events: none;
    `;

    box3d.appendChild(front);
    box3d.appendChild(top);
    box3d.appendChild(right);
    box3d.appendChild(flapLine);
    box3d.appendChild(seam);
    wrapper.appendChild(box3d);

    return wrapper;
  }

  function adjustBrightness(hex, amount) {
    const num = parseInt(hex.slice(1), 16);
    const r = Math.min(255, Math.max(0, ((num >> 16) & 0xFF) + amount));
    const g = Math.min(255, Math.max(0, ((num >> 8) & 0xFF) + amount));
    const b = Math.min(255, Math.max(0, (num & 0xFF) + amount));
    return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
  }

  function addBox(x, y, sizeIdx) {
    if (sizeIdx === undefined) sizeIdx = Math.floor(Math.random() * BOX_SIZES.length);
    const size = BOX_SIZES[sizeIdx];
    const color = COLORS[boxIdCounter % COLORS.length];
    const id = boxIdCounter++;

    const el = createBox3D(size.w, size.h, size.d, color);
    el.style.zIndex = zCounter++;
    canvas.appendChild(el);

    const box = {
      id, el, x, y,
      w: size.w,
      h: size.h,
      d: size.d,
      vx: 0,
      vy: 0,
      rotation: 0,
      scale: 1,
      color,
      dragging: false,
      settled: false,
      mass: (size.w * size.h * size.d) / 10000,
    };

    el._box = box;
    boxes.push(box);
    updateBoxTransform(box);
    setupBoxDrag(box);

    el.style.opacity = '0';
    el.style.transition = 'opacity 0.3s';
    requestAnimationFrame(() => {
      el.style.opacity = '1';
      setTimeout(() => el.style.transition = '', 300);
    });

    return box;
  }

  function updateBoxTransform(box) {
    box.el.style.transform = `translate(${box.x}px, ${box.y}px) rotate(${box.rotation}deg) scale(${box.scale})`;
  }

  function removeBox(box) {
    box.el.remove();
    boxes = boxes.filter(b => b.id !== box.id);
  }

  // Collision uses scaled dimensions
  function getAABB(box) {
    const sw = box.w * box.scale / 2;
    const sh = box.h * box.scale / 2;
    return {
      left: box.x - sw,
      right: box.x + sw,
      top: box.y - sh,
      bottom: box.y + sh,
    };
  }

  function aabbOverlap(a, b) {
    return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
  }

  function resolveCollision(box, other) {
    const a = getAABB(box);
    const b = getAABB(other);
    if (!aabbOverlap(a, b)) return;

    const overlapX = Math.min(a.right - b.left, b.right - a.left);
    const overlapY = Math.min(a.bottom - b.top, b.bottom - a.top);

    if (overlapX < overlapY) {
      if (box.x < other.x) {
        box.x -= overlapX / 2;
        other.x += overlapX / 2;
      } else {
        box.x += overlapX / 2;
        other.x -= overlapX / 2;
      }
      const avgVx = (box.vx * box.mass + other.vx * other.mass) / (box.mass + other.mass);
      box.vx = avgVx * BOUNCINESS;
      other.vx = avgVx * BOUNCINESS;
    } else {
      if (box.y < other.y) {
        box.y -= overlapY / 2;
        other.y += overlapY / 2;
      } else {
        box.y += overlapY / 2;
        other.y -= overlapY / 2;
      }
      box.vy = -Math.abs(box.vy) * BOUNCINESS;
      other.vy = Math.abs(other.vy) * BOUNCINESS;
      box.vx *= FRICTION;
      other.vx *= FRICTION;
    }
  }

  function physicsStep() {
    const groundY = getGroundY();
    const screenW = window.innerWidth;

    for (const box of boxes) {
      if (box.dragging) continue;

      if (gravityOn) box.vy += GRAVITY;

      box.vx *= DAMPING;
      box.vy *= DAMPING;

      box.x += box.vx;
      box.y += box.vy;

      // Ground collision (using scaled height)
      const halfH = (box.h * box.scale) / 2;
      if (box.y + halfH > groundY) {
        box.y = groundY - halfH;
        box.vy = -box.vy * BOUNCINESS;
        box.vx *= FRICTION;
        if (Math.abs(box.vy) < 0.5) box.vy = 0;
      }

      const halfW = (box.w * box.scale) / 2;
      if (box.x - halfW < 0) {
        box.x = halfW;
        box.vx = Math.abs(box.vx) * BOUNCINESS;
      }
      if (box.x + halfW > screenW) {
        box.x = screenW - halfW;
        box.vx = -Math.abs(box.vx) * BOUNCINESS;
      }
    }

    for (let pass = 0; pass < 3; pass++) {
      for (let i = 0; i < boxes.length; i++) {
        for (let j = i + 1; j < boxes.length; j++) {
          if (boxes[i].dragging || boxes[j].dragging) continue;
          resolveCollision(boxes[i], boxes[j]);
        }
      }
      for (const box of boxes) {
        if (box.dragging) continue;
        const halfH = (box.h * box.scale) / 2;
        if (box.y + halfH > groundY) {
          box.y = groundY - halfH;
          if (Math.abs(box.vy) < 0.5) box.vy = 0;
        }
      }
    }

    let settledCount = 0;
    for (const box of boxes) {
      const wasSettled = box.settled;
      box.settled = !box.dragging && Math.abs(box.vx) < 0.1 && Math.abs(box.vy) < 0.1;
      if (box.settled) settledCount++;
      if (box.settled && !wasSettled) box.el.classList.add('settled');
      if (!box.settled && wasSettled) box.el.classList.remove('settled');
    }

    for (const box of boxes) {
      if (!box.dragging) updateBoxTransform(box);
    }

    const maxStack = calculateMaxStack();
    document.getElementById('stats').textContent =
      `Boxes: ${boxes.length} · Settled: ${settledCount} · Max stack: ${maxStack}`;

    animFrame = requestAnimationFrame(physicsStep);
  }

  function calculateMaxStack() {
    if (boxes.length === 0) return 0;
    let maxH = 1;
    const sorted = [...boxes].sort((a, b) => b.y - a.y);
    for (const box of sorted) {
      let stackHeight = 1;
      let current = box;
      for (let step = 0; step < boxes.length; step++) {
        const above = sorted.find(b => {
          if (b.id === current.id) return false;
          const aBox = getAABB(b);
          const cBox = getAABB(current);
          const hOverlap = aBox.left < cBox.right - 5 && aBox.right > cBox.left + 5;
          const onTop = Math.abs(aBox.bottom - cBox.top) < 10;
          return hOverlap && onTop;
        });
        if (above) { stackHeight++; current = above; }
        else break;
      }
      maxH = Math.max(maxH, stackHeight);
    }
    return maxH;
  }

  // ── Multi-touch drag / pinch-scale / two-finger-rotate ──
  function setupBoxDrag(box) {
    const pointers = new Map();
    let startState = null;
    let startMidpoint = null;
    let startDist = null;
    let startAngle = null;
    let lastMid = null;
    const trashZone = document.getElementById('trash-zone');

    function getMid() {
      let sx = 0, sy = 0;
      pointers.forEach(p => { sx += p.x; sy += p.y; });
      return { x: sx / pointers.size, y: sy / pointers.size };
    }

    function getDist() {
      const arr = Array.from(pointers.values());
      if (arr.length < 2) return 0;
      const dx = arr[1].x - arr[0].x, dy = arr[1].y - arr[0].y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function getAngle() {
      const arr = Array.from(pointers.values());
      if (arr.length < 2) return 0;
      return Math.atan2(arr[1].y - arr[0].y, arr[1].x - arr[0].x) * 180 / Math.PI;
    }

    box.el.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      box.el.setPointerCapture(e.pointerId);
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

      box.dragging = true;
      box.vx = 0;
      box.vy = 0;
      box.el.classList.add('dragging');
      box.el.classList.remove('settled');
      box.el.style.zIndex = zCounter++;

      startState = { x: box.x, y: box.y, scale: box.scale, rotation: box.rotation };
      startMidpoint = getMid();
      lastMid = getMid();

      if (pointers.size >= 2) {
        startDist = getDist();
        startAngle = getAngle();
      }
    });

    box.el.addEventListener('pointermove', (e) => {
      if (!pointers.has(e.pointerId)) return;
      e.preventDefault();
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

      const mid = getMid();

      // Translate
      box.x = startState.x + (mid.x - startMidpoint.x);
      box.y = startState.y + (mid.y - startMidpoint.y);

      // Scale + Rotate (2+ fingers)
      if (pointers.size >= 2 && startDist > 0) {
        const curDist = getDist();
        const curAngle = getAngle();
        box.scale = Math.max(0.3, Math.min(3, startState.scale * (curDist / startDist)));
        box.rotation = startState.rotation + (curAngle - startAngle);
      }

      // Track velocity for throw
      box.vx = (mid.x - lastMid.x) * 0.5;
      box.vy = (mid.y - lastMid.y) * 0.5;
      lastMid = { ...mid };

      updateBoxTransform(box);

      // Trash zone check
      const trashRect = trashZone.getBoundingClientRect();
      const trashCX = trashRect.left + trashRect.width / 2;
      const trashCY = trashRect.top + trashRect.height / 2;
      const distToTrash = Math.sqrt((mid.x - trashCX) ** 2 + (mid.y - trashCY) ** 2);
      trashZone.classList.toggle('active', distToTrash < 60);
    });

    function onUp(e) {
      pointers.delete(e.pointerId);

      if (pointers.size === 0) {
        box.dragging = false;
        box.el.classList.remove('dragging');
        trashZone.classList.remove('active');

        const trashRect = trashZone.getBoundingClientRect();
        const trashCX = trashRect.left + trashRect.width / 2;
        const trashCY = trashRect.top + trashRect.height / 2;
        const distToTrash = Math.sqrt((e.clientX - trashCX) ** 2 + (e.clientY - trashCY) ** 2);

        if (distToTrash < 60) {
          removeBox(box);
          return;
        }
      } else {
        // Reset gesture baseline for remaining fingers
        startState = { x: box.x, y: box.y, scale: box.scale, rotation: box.rotation };
        startMidpoint = getMid();
        lastMid = getMid();
        if (pointers.size >= 2) {
          startDist = getDist();
          startAngle = getAngle();
        }
      }
    }

    box.el.addEventListener('pointerup', onUp);
    box.el.addEventListener('pointercancel', onUp);
  }

  // ── Toolbar ──
  document.getElementById('add-box').addEventListener('click', () => {
    const w = window.innerWidth;
    const x = w * 0.2 + Math.random() * w * 0.6;
    const y = 80 + Math.random() * 100;
    addBox(x, y);
  });

  document.getElementById('toggle-gravity').addEventListener('click', () => {
    const btn = document.getElementById('toggle-gravity');
    gravityOn = !gravityOn;
    btn.textContent = gravityOn ? '⬇️ Gravity' : '🚫 No Gravity';
    btn.classList.toggle('active', !gravityOn);
    if (!gravityOn) {
      boxes.forEach(b => { b.vx = 0; b.vy = 0; });
    }
  });

  document.getElementById('clear-all').addEventListener('click', () => {
    boxes.forEach(b => b.el.remove());
    boxes = [];
  });

  // ── Init ──
  const w = window.innerWidth;
  addBox(w * 0.35, 200, 1);
  addBox(w * 0.50, 150, 0);
  addBox(w * 0.65, 180, 3);

  // Start physics
  physicsStep();

  setTimeout(() => {
    document.getElementById('hint')?.classList.add('fade');
  }, 5000);

})();
</script>
</body>
</html>
